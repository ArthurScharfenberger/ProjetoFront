<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doguinho Fofo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <img src="./img/dog.gif" alt="Cachorrinho fofo" class="dog-img">

    <span class="tag">Pet do Dia</span>

    <h1>Tobby, o doguinho feliz</h1>

    <p class="descricao">
      Esse é um site simples de brincadeira para apresentar um cachorrinho muito fofo,
      calmo e cheio de energia.
    </p>

    <div class="info">
      <div class="item">
        <h2>Idade</h2>
        <p>2 anos</p>
      </div>

      <div class="item">
        <h2>Personalidade</h2>
        <p>Brincalhão</p>
      </div>

      <div class="item">
        <h2>Comida favorita</h2>
        <p>Biscoitinho</p>
      </div>
    </div>

    <button>Adotar amizade</button>
  </main>
</body>
</html>
